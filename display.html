<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Broadcast - MASS KEMPO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #2b2b2b; color: #fff; overflow: hidden; }
        .font-display { font-family: 'Oswald', sans-serif; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col relative bg-[#2b2b2b]">

    <div id="view-idle" class="absolute inset-0 z-50 flex flex-col items-center justify-center animate-pulse bg-black">
        <img src="logo-saya.svg" class="w-32 h-32 mb-6 opacity-50 grayscale" alt="Logo" onerror="this.style.display='none'">
        <h1 class="text-3xl font-black text-slate-700 tracking-widest">TV SUTRADARA OFFLINE</h1>
    </div>

    <div id="view-preview" class="absolute inset-0 z-40 flex flex-col hidden bg-[#2b2b2b]">
        <div class="flex-grow flex items-center justify-center">
            <div class="border border-slate-500 bg-[#1f1f1f] p-10 rounded-3xl text-center w-3/4 shadow-2xl">
                <div class="text-yellow-500 text-2xl font-bold tracking-[0.3em] mb-4 uppercase"><i class="fas fa-play-circle mr-2"></i> PERSIAPAN MATRAS</div>
                <div id="preview-nama" class="text-6xl font-black text-white leading-tight mb-4">-</div>
                <div class="inline-block bg-[#2b2b2b] border border-slate-500 px-6 py-2 rounded-full text-2xl font-bold text-slate-300">
                    KONTINGEN: <span id="preview-kontingen" class="text-white">-</span>
                </div>
            </div>
        </div>
    </div>

    <div id="view-score" class="absolute inset-0 z-40 flex flex-col hidden bg-[#2b2b2b] p-8">
        
        <div class="flex justify-between items-start mb-6">
            <div>
                <div class="text-xl font-semibold tracking-wider text-slate-300">KEJUARAAN NASIONAL BELADIRI SENI 2024</div>
                <div id="tv-score-kategori-head" class="text-5xl font-normal text-white mt-1">Menunggu Data...</div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <div class="text-sm font-bold uppercase tracking-widest text-slate-300">WAKTU</div>
                    <div id="tv-score-waktu" class="text-5xl font-bold tracking-wider">00:00</div>
                </div>
                <i class="fas fa-stopwatch text-6xl text-slate-300"></i>
            </div>
        </div>

        <div class="flex gap-6 items-stretch flex-grow">
            
            <div class="w-5/12 flex flex-col gap-4">
                <div class="border-2 border-slate-400 p-1 flex-grow flex flex-col">
                    <div class="grid grid-cols-2 gap-0 border-2 border-slate-400 bg-black/10 flex-grow content-start" id="tv-score-name-container">
                        </div>
                </div>

                <div class="border-2 border-slate-400 flex items-center p-3 gap-4 bg-black/10">
                    <div class="w-[70px] h-[50px] flex flex-col border border-slate-500 shadow-sm">
                        <div class="flex-1 bg-red-600"></div>
                        <div class="flex-1 bg-white"></div>
                    </div>
                    <div class="flex-1">
                        <div class="text-[11px] font-bold uppercase tracking-widest text-slate-300 leading-none mb-1">KONTINGEN :</div>
                        <div id="tv-score-kontingen" class="text-3xl font-black uppercase text-white leading-none tracking-wider">-</div>
                    </div>
                    <div class="w-14 h-14 bg-slate-700 rounded-full border border-slate-500 overflow-hidden flex items-center justify-center">
                        <img src="logo-saya.svg" class="w-10 h-10 object-contain" onerror="this.style.display='none'">
                    </div>
                </div>

                <div class="border-2 border-slate-400 w-1/2 bg-black/10 flex flex-col justify-center">
                    <div class="text-center py-2 border-b-2 border-slate-400 text-lg font-bold tracking-widest text-slate-300 uppercase">DENDA</div>
                    <div id="tv-score-denda" class="text-center py-3 text-5xl font-black text-red-500">0</div>
                </div>
            </div>

            <div class="w-7/12 flex flex-col">
                
                <div class="flex justify-end mb-2">
                    <div class="flex items-center gap-2 text-xl font-bold tracking-widest text-slate-300">
                        <img src="logo-saya.svg" class="w-6 h-6 grayscale" onerror="this.style.display='none'"> JUDGE PANEL
                    </div>
                </div>

                <div id="tv-score-wasit-container" class="grid grid-cols-5 gap-2 mb-6">
                    </div>

                <div class="border-2 border-slate-400 flex flex-col items-center flex-grow bg-[#1f1f1f]" style="clip-path: polygon(0 0, 100% 0, 100% calc(100% - 40px), calc(100% - 40px) 100%, 0 100%);">
                    <div class="bg-slate-200 text-black w-full text-center py-2 text-5xl font-black tracking-widest uppercase">
                        SKOR AKHIR
                    </div>
                    <div class="flex-grow flex items-center justify-center w-full relative">
                        <span id="tv-score-final" class="text-[14rem] font-bold text-[#cca650] leading-none font-display pt-4">0.000</span>
                        <i class="fas fa-sparkles absolute bottom-6 right-6 text-4xl text-slate-500/30"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="view-randori" class="absolute inset-0 z-50 flex hidden bg-black">
        <div class="flex-1 bg-red-600 flex flex-col justify-between p-10 relative">
             <div class="text-center bg-black/30 p-4 rounded-xl border border-red-500/50">
                 <div id="tv-randori-kategori" class="text-xl font-bold text-red-200 uppercase">-</div>
                 <div id="tv-randori-nama-merah" class="text-6xl font-black text-white">-</div>
                 <div id="tv-randori-kont-merah" class="text-2xl font-bold text-red-200">-</div>
             </div>
             <div class="flex-grow flex items-center justify-center">
                 <div id="tv-randori-skor-merah" class="text-[20rem] font-mono font-black text-white leading-none">0</div>
             </div>
        </div>
        <div class="absolute left-1/2 top-5 -translate-x-1/2 z-50 bg-slate-900 px-10 py-4 rounded-3xl border-2 border-slate-600 shadow-2xl">
            <span id="tv-randori-waktu" class="text-6xl font-mono font-black text-yellow-400 tracking-widest">00:00</span>
        </div>
        <div class="flex-1 bg-white flex flex-col justify-between p-10 relative">
             <div class="text-center bg-slate-200 p-4 rounded-xl border border-slate-300">
                 <div class="text-xl font-bold text-slate-500 uppercase">PITA PUTIH</div>
                 <div id="tv-randori-nama-putih" class="text-6xl font-black text-slate-900">-</div>
                 <div id="tv-randori-kont-putih" class="text-2xl font-bold text-slate-500">-</div>
             </div>
             <div class="flex-grow flex items-center justify-center">
                 <div id="tv-randori-skor-putih" class="text-[20rem] font-mono font-black text-slate-900 leading-none">0</div>
             </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA63UtPlhEdC9qKmmHVpDjGv_4RqWjK47k",
            authDomain: "mass-pro-turnamen.firebaseapp.com",
            projectId: "mass-pro-turnamen",
            databaseURL: "https://mass-pro-turnamen-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "mass-pro-turnamen.firebasestorage.app",
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const courtId = urlParams.get('court') || 'court_1';

        const views = {
            idle: document.getElementById('view-idle'),
            preview: document.getElementById('view-preview'),
            score: document.getElementById('view-score'),
            randori: document.getElementById('view-randori')
        };

        function switchView(target) {
            Object.values(views).forEach(v => v.classList.add('hidden'));
            views[target].classList.remove('hidden');
        }

        let displayTimer = null; 
        let savedPreviewData = null; 

        database.ref(`live_broadcast/${courtId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (!data || data.current_action === 'idle') {
                switchView('idle');
                return;
            }

            if (data.type === 'randori') {
                if(displayTimer) { clearTimeout(displayTimer); displayTimer = null; }
                switchView('randori');
                document.getElementById('tv-randori-kategori').innerText = data.kategori || "-";
                document.getElementById('tv-randori-waktu').innerText = data.waktu || "00:00";
                document.getElementById('tv-randori-nama-merah').innerText = data.merah.nama || "-";
                document.getElementById('tv-randori-kont-merah').innerText = data.merah.kontingen || "-";
                document.getElementById('tv-randori-skor-merah').innerText = data.merah.skor || "0";
                document.getElementById('tv-randori-nama-putih').innerText = data.putih.nama || "-";
                document.getElementById('tv-randori-kont-putih').innerText = data.putih.kontingen || "-";
                document.getElementById('tv-randori-skor-putih').innerText = data.putih.skor || "0";
                return;
            }

            if (data.preview_data) savedPreviewData = data.preview_data;

            if (data.current_action === 'show_score' && data.score_data) {
                if(displayTimer) clearTimeout(displayTimer);
                switchView('score');
                
                const sData = data.score_data;
                
                // MAPPING DATA KE HTML (SINKRONISASI ID)
                document.getElementById('tv-score-kategori-head').innerText = sData.kategori;
                document.getElementById('tv-score-waktu').innerText = sData.waktu;
                document.getElementById('tv-score-kontingen').innerText = sData.kontingen;
                document.getElementById('tv-score-denda').innerText = sData.denda > 0 ? `-${sData.denda}` : '0';
                document.getElementById('tv-score-final').innerText = sData.nilaiAkhir;

                // MAPPING TABEL NAMA ATLET (Format 2 Kolom dengan Garis Tepi)
                let names = sData.nama.split('&').map(n => n.trim());
                let nameHTML = '';
                names.forEach((n, idx) => {
                    nameHTML += `
                    <div class="flex items-center text-xl text-white border-b-2 border-r-2 border-slate-400">
                        <span class="w-10 py-3 text-center border-r-2 border-slate-400 text-slate-300 font-normal">${idx+1}</span>
                        <span class="pl-4 truncate font-normal tracking-wide">${n}</span>
                    </div>`;
                });
                document.getElementById('tv-score-name-container').innerHTML = nameHTML;

                // MAPPING KOTAK WASIT 1-5
                let wasitHTML = '';
                let rawScores = sData.rawScores || [];
                while(rawScores.length < 5) rawScores.push('-');
                
                rawScores.forEach((score, i) => {
                    wasitHTML += `
                    <div class="border-2 border-slate-400 flex flex-col text-center bg-black/10">
                        <div class="border-b-2 border-slate-400 py-1 text-sm font-bold text-slate-300 uppercase tracking-widest">
                            WASIT ${i+1}
                        </div>
                        <div class="py-3 flex items-center justify-center">
                            <span class="text-[3.5rem] font-black text-white font-display leading-none">${score > 0 ? parseFloat(score).toFixed(2) : '-'}</span>
                        </div>
                    </div>`;
                });
                document.getElementById('tv-score-wasit-container').innerHTML = wasitHTML;

                displayTimer = setTimeout(() => {
                    if (savedPreviewData) {
                        document.getElementById('tv-header-kategori').innerText = savedPreviewData.kategori;
                        document.getElementById('preview-nama').innerText = savedPreviewData.nama;
                        document.getElementById('preview-kontingen').innerText = savedPreviewData.kontingen;
                    }
                    switchView('preview');
                    displayTimer = null; 
                }, 10000); 
            } 
            else if (data.current_action === 'preview' && !displayTimer) {
                document.getElementById('preview-nama').innerText = data.preview_data.nama;
                document.getElementById('preview-kontingen').innerText = data.preview_data.kontingen;
                switchView('preview');
            }
        });
    </script>
</body>
</html>
