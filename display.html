<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Broadcast - MASS KEMPO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow: hidden; margin: 0; padding: 0; }
        .font-display { font-family: 'Oswald', sans-serif; }
        
        /* Master Letterbox (Kunci Rasio 16:9) */
        .broadcast-container {
            position: relative; width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; 
            margin: auto; background-color: #111; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .skor-raksasa { font-size: clamp(5rem, 20vh, 14rem); line-height: 1; display: inline-block; transform: translateY(-5%); }
        .skor-embu { font-size: clamp(5rem, 18vh, 12rem); line-height: 1; display: inline-block; transform: translateY(-5%); }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center bg-black">

    <div class="broadcast-container">

        <div id="view-idle" class="absolute inset-0 z-50 flex-col items-center justify-center animate-pulse bg-black hidden">
            <h1 class="text-3xl font-black text-slate-700 tracking-widest uppercase">TV Sutradara Offline</h1>
        </div>

        <div id="view-score" class="absolute inset-0 z-40 flex-col bg-[#111] p-4 md:p-8 font-sans text-white hidden">
            
            <div class="flex-none mb-4">
                <h1 id="tv-global-judul" class="text-sm md:text-lg font-bold text-slate-400 tracking-widest uppercase mb-1">KEJUARAAN NASIONAL BELADIRI SENI 2024</h1>
                <h2 id="tv-score-kategori-head" class="text-2xl md:text-4xl text-white font-light uppercase tracking-wide">-</h2>
            </div>

            <div class="flex justify-between items-stretch gap-4 flex-none mb-4">
                <div class="border border-[#444] flex items-center p-3 md:p-4 gap-4 min-w-[250px] md:min-w-[350px] bg-black/10">
                    <div class="w-[50px] md:w-[70px] h-[35px] md:h-[45px] flex flex-col border border-slate-500 shadow-sm">
                        <div class="flex-1 bg-red-600"></div><div class="flex-1 bg-white"></div>
                    </div>
                    <div class="flex flex-col justify-center">
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">KONTINGEN :</span>
                        <span id="tv-score-kontingen" class="text-xl md:text-3xl font-black text-white uppercase tracking-wider leading-none">-</span>
                    </div>
                </div>

                <div class="border border-[#444] flex items-center justify-center px-6 md:px-8 gap-4 bg-black/10">
                    <span id="tv-score-waktu" class="text-4xl md:text-6xl font-bold tracking-wider font-mono">00:00</span>
                    <i class="fas fa-stopwatch text-3xl md:text-5xl text-slate-400"></i>
                </div>
            </div>

            <div class="flex flex-1 gap-4 min-h-0 mb-4">
                <div class="border border-[#444] flex flex-col w-[40%] bg-black/10 overflow-hidden">
                    <div class="border-b border-[#444] text-center py-2 text-xs md:text-sm font-bold tracking-widest text-slate-400 flex-none">ATLET</div>
                    
                    <div id="tv-score-name-container">
                        </div>
                </div>

                <div class="border border-[#444] flex flex-col flex-1 relative items-center justify-center bg-black/10" style="clip-path: polygon(0 0, 100% 0, 100% calc(100% - 40px), calc(100% - 40px) 100%, 0 100%);">
                    <div class="text-xl md:text-3xl font-bold tracking-widest text-slate-400 z-10 mb-2 md:mb-4 drop-shadow-md">NILAI AKHIR</div>
                    <div id="tv-score-final" class="font-black text-slate-700 z-10 drop-shadow-lg font-display skor-embu">-</div>
                </div>
            </div>

            <div class="flex gap-4 flex-none h-[15vh] min-h-[80px]">
                <div id="tv-score-wasit-container" class="flex flex-1 gap-4">
                    </div>
                <div class="border border-[#444] flex flex-col w-[15%] bg-black/10">
                    <div class="border-b border-[#444] text-center py-1 text-xs md:text-sm font-bold tracking-widest text-slate-400">DENDA</div>
                    <div class="flex-1 flex items-center justify-center">
                        <span id="tv-score-denda" class="text-4xl md:text-6xl font-black text-slate-700 font-display">-</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-randori" class="absolute inset-0 z-50 flex-col bg-[#111] p-4 md:p-8 font-sans text-white hidden">
            
            <div class="flex justify-between items-start mb-4 flex-none">
                <div>
                    <h1 id="tv-randori-global-judul" class="text-sm md:text-lg font-bold text-slate-400 tracking-widest uppercase mb-1">KEJUARAAN NASIONAL BELADIRI SENI 2024</h1>
                    <h2 id="tv-randori-kategori" class="text-2xl md:text-4xl text-white font-light uppercase tracking-wide">-</h2>
                </div>
                <div class="border border-[#444] flex items-center justify-center px-6 md:px-8 py-2 md:py-3 gap-4 bg-black/20">
                    <span id="tv-randori-waktu" class="text-4xl md:text-6xl font-bold tracking-wider font-mono">00:00</span>
                    <i class="fas fa-stopwatch text-3xl md:text-5xl text-slate-400"></i>
                </div>
            </div>

            <div class="flex flex-1 gap-4 md:gap-6 min-h-0">
                
                <div class="flex-1 flex flex-col gap-3 md:gap-4">
                    <div class="border border-[#444] flex items-center p-3 gap-4 bg-black/20 flex-none">
                        <div class="w-[50px] md:w-[70px] h-[35px] md:h-[45px] flex flex-col border border-slate-500 shadow-sm">
                            <div class="flex-1 bg-red-600"></div><div class="flex-1 bg-white"></div>
                        </div>
                        <div class="flex flex-col justify-center">
                            <span class="text-[9px] md:text-[11px] text-slate-400 font-bold uppercase tracking-widest mb-1">KONTINGEN :</span>
                            <span id="tv-randori-kont-merah" class="text-xl md:text-3xl font-black text-white uppercase tracking-wider leading-none">-</span>
                        </div>
                    </div>
                    
                    <div class="border border-[#444] flex flex-col bg-black/20 flex-none">
                        <div class="bg-red-800 text-center py-1 md:py-1.5 text-[10px] md:text-xs font-bold tracking-widest text-white uppercase">NAMA ATLET (PITA MERAH)</div>
                        <div class="py-1.5 md:py-2 px-4 flex items-center justify-center min-h-0">
                            <span id="tv-randori-nama-merah" class="text-xl md:text-2xl font-medium text-white text-center leading-tight line-clamp-2 w-full">-</span>
                        </div>
                    </div>

                    <div class="border border-[#444] flex-1 flex items-center justify-center bg-black/20 relative overflow-hidden">
                        <span class="absolute top-2 left-4 text-slate-600 font-bold tracking-widest uppercase text-xs md:text-sm">SKOR</span>
                        <span id="tv-randori-skor-merah" class="font-black text-red-500 font-display drop-shadow-lg skor-raksasa">0</span>
                    </div>
                </div>

                <div class="flex-1 flex flex-col gap-3 md:gap-4">
                    <div class="border border-[#444] flex items-center p-3 gap-4 bg-black/20 flex-none">
                        <div class="w-[50px] md:w-[70px] h-[35px] md:h-[45px] flex flex-col border border-slate-500 shadow-sm">
                            <div class="flex-1 bg-red-600"></div><div class="flex-1 bg-white"></div>
                        </div>
                        <div class="flex flex-col justify-center">
                            <span class="text-[9px] md:text-[11px] text-slate-400 font-bold uppercase tracking-widest mb-1">KONTINGEN :</span>
                            <span id="tv-randori-kont-putih" class="text-xl md:text-3xl font-black text-white uppercase tracking-wider leading-none">-</span>
                        </div>
                    </div>
                    
                    <div class="border border-[#444] flex flex-col bg-black/20 flex-none">
                        <div class="bg-slate-200 text-center py-1 md:py-1.5 text-[10px] md:text-xs font-bold tracking-widest text-slate-900 uppercase">NAMA ATLET (PITA PUTIH)</div>
                        <div class="py-1.5 md:py-2 px-4 flex items-center justify-center min-h-0">
                            <span id="tv-randori-nama-putih" class="text-xl md:text-2xl font-medium text-white text-center leading-tight line-clamp-2 w-full">-</span>
                        </div>
                    </div>

                    <div class="border border-[#444] flex-1 flex items-center justify-center bg-black/20 relative overflow-hidden">
                        <span class="absolute top-2 left-4 text-slate-600 font-bold tracking-widest uppercase text-xs md:text-sm">SKOR</span>
                        <span id="tv-randori-skor-putih" class="font-black text-white font-display drop-shadow-lg skor-raksasa">0</span>
                    </div>
                </div>

            </div>

            <div class="flex-none mt-3 flex justify-center">
                <h3 id="tv-randori-court" class="text-2xl md:text-4xl font-black tracking-widest text-slate-600 uppercase">COURT A</h3>
            </div>

        </div>

    </div> <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA63UtPlhEdC9qKmmHVpDjGv_4RqWjK47k",
            authDomain: "mass-pro-turnamen.firebaseapp.com",
            projectId: "mass-pro-turnamen",
            databaseURL: "https://mass-pro-turnamen-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "mass-pro-turnamen.firebasestorage.app",
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const courtId = urlParams.get('court') || 'court_1';

        const views = {
            idle: document.getElementById('view-idle'),
            score: document.getElementById('view-score'),
            randori: document.getElementById('view-randori')
        };

        function switchView(target) {
            Object.values(views).forEach(v => {
                v.classList.add('hidden');
                v.classList.remove('flex'); 
            });
            views[target].classList.remove('hidden');
            views[target].classList.add('flex'); 
        }

        database.ref('turnamen_data/settings/judulTV').on('value', (snap) => {
            const judulText = snap.val() || "KEJUARAAN NASIONAL BELADIRI SENI 2024";
            const judulEl = document.getElementById('tv-global-judul');
            const randoriJudulEl = document.getElementById('tv-randori-global-judul');
            if (judulEl) judulEl.innerText = judulText;
            if (randoriJudulEl) randoriJudulEl.innerText = judulText;
        });

        // ==============================================================
        // LOGIKA CERDAS EMBU (Tetap dipertahankan dari versi sebelumnya)
        // ==============================================================
        function injectNamesToTV(namaString) {
            let names = namaString.split('&').map(n => n.trim());
            let isBeregu = names.length > 3; 
            let containerEl = document.getElementById('tv-score-name-container');
            
            if (isBeregu) {
                containerEl.className = "flex-1 overflow-hidden px-3 md:px-5 py-2 grid grid-cols-2 gap-x-4 gap-y-1.5 content-center";
            } else {
                containerEl.className = "flex-1 overflow-hidden px-4 md:px-6 py-2 flex flex-col justify-center gap-3";
            }

            let textSize = isBeregu ? "text-base md:text-xl" : "text-xl md:text-3xl";
            
            let nameHTML = '';
            names.forEach((n, idx) => {
                nameHTML += `
                <div class="flex items-center ${textSize} text-white font-light border-b border-[#333] pb-1 min-w-0 w-full mt-1.5">
                    <span class="w-5 md:w-6 text-right mr-2 text-slate-500 font-mono tracking-wider flex-shrink-0 leading-none">${idx+1}.</span>
                    <span class="truncate tracking-wide block w-full leading-none mb-0.5">${n}</span>
                </div>`;
            });
            containerEl.innerHTML = nameHTML;
        }
        // ==============================================================

        let displayTimer = null; 
        let savedPreviewData = null; 

        function renderEmptyScoreLayout(previewData) {
            if(!previewData) return;
            document.getElementById('tv-score-kategori-head').innerText = previewData.kategori;
            document.getElementById('tv-score-waktu').innerText = '00:00';
            document.getElementById('tv-score-kontingen').innerText = previewData.kontingen;

            let finalEl = document.getElementById('tv-score-final');
            finalEl.innerText = "-";
            finalEl.className = "font-black text-slate-700 z-10 drop-shadow-lg font-display skor-embu";

            let dendaEl = document.getElementById('tv-score-denda');
            dendaEl.innerText = "-";
            dendaEl.className = "text-4xl md:text-6xl font-black text-slate-700 font-display";

            injectNamesToTV(previewData.nama);

            let wasitHTML = '';
            for(let i=0; i<5; i++) {
                wasitHTML += `
                <div class="border border-[#444] flex-1 flex flex-col text-center bg-black/10">
                    <div class="border-b border-[#444] py-1 text-[9px] md:text-xs font-bold text-slate-400 uppercase tracking-widest">WASIT ${i+1}</div>
                    <div class="flex-1 flex items-center justify-center">
                        <span class="text-3xl md:text-5xl font-black text-slate-700 font-display">-</span>
                    </div>
                </div>`;
            }
            document.getElementById('tv-score-wasit-container').innerHTML = wasitHTML;
            switchView('score');
        }

        database.ref(`live_broadcast/${courtId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (!data || data.current_action === 'idle') {
                switchView('idle');
                return;
            }

            if (data.type === 'randori') {
                if(displayTimer) { clearTimeout(displayTimer); displayTimer = null; }
                switchView('randori');
                document.getElementById('tv-randori-kategori').innerText = data.kategori || "-";
                document.getElementById('tv-randori-waktu').innerText = data.waktu || "00:00";
                document.getElementById('tv-randori-nama-merah').innerText = data.merah.nama || "-";
                document.getElementById('tv-randori-kont-merah').innerText = data.merah.kontingen || "-";
                document.getElementById('tv-randori-skor-merah').innerText = data.merah.skor || "0";
                document.getElementById('tv-randori-nama-putih').innerText = data.putih.nama || "-";
                document.getElementById('tv-randori-kont-putih').innerText = data.putih.kontingen || "-";
                document.getElementById('tv-randori-skor-putih').innerText = data.putih.skor || "0";
                
                document.getElementById('tv-randori-court').innerText = courtId.replace('_', ' ').toUpperCase();
                return;
            }

            if (data.preview_data) savedPreviewData = data.preview_data;

            if (data.current_action === 'show_score' && data.score_data) {
                if(displayTimer) clearTimeout(displayTimer);
                
                const sData = data.score_data;
                document.getElementById('tv-score-kategori-head').innerText = sData.kategori;
                document.getElementById('tv-score-waktu').innerText = sData.waktu;
                document.getElementById('tv-score-kontingen').innerText = sData.kontingen;
                
                let finalEl = document.getElementById('tv-score-final');
                finalEl.innerText = sData.nilaiAkhir;
                finalEl.className = "font-black text-[#cca650] z-10 drop-shadow-lg font-display skor-embu";

                let dendaEl = document.getElementById('tv-score-denda');
                dendaEl.innerText = sData.denda > 0 ? `-${sData.denda}` : '0';
                dendaEl.className = "text-4xl md:text-6xl font-black text-red-500 font-display";

                injectNamesToTV(sData.nama);

                let wasitHTML = '';
                let rawScores = sData.rawScores || [];
                while(rawScores.length < 5) rawScores.push('-');
                
                rawScores.forEach((score, i) => {
                    wasitHTML += `
                    <div class="border border-[#444] flex-1 flex flex-col text-center bg-black/10">
                        <div class="border-b border-[#444] py-1 text-[9px] md:text-xs font-bold text-slate-400 uppercase tracking-widest">WASIT ${i+1}</div>
                        <div class="flex-1 flex items-center justify-center">
                            <span class="text-3xl md:text-5xl font-black text-white font-display leading-none">${score > 0 ? parseFloat(score).toFixed(2) : '-'}</span>
                        </div>
                    </div>`;
                });
                document.getElementById('tv-score-wasit-container').innerHTML = wasitHTML;
                switchView('score');

                displayTimer = setTimeout(() => {
                    if (savedPreviewData) {
                        renderEmptyScoreLayout(savedPreviewData);
                    }
                    displayTimer = null; 
                }, 10000); 
            } 
            else if (data.current_action === 'preview' && !displayTimer) {
                renderEmptyScoreLayout(data.preview_data);
            }
        });
    </script>
</body>
</html>
