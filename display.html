<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Broadcast - MASS KEMPO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #262626; color: #fff; overflow: hidden; }
        .font-display { font-family: 'Oswald', sans-serif; }
        .judge-box { border: 2px solid #525252; text-align: center; background: rgba(0,0,0,0.2); }
        .judge-header { border-bottom: 2px solid #525252; padding: 4px; font-size: 1rem; color: #a3a3a3; letter-spacing: 1px; }
        .judge-score { font-size: 3.5rem; font-weight: 900; padding: 10px; font-family: 'Oswald', sans-serif; }
        .score-board { border: 4px solid #facc15; border-radius: 16px; background: #171717; position: relative; }
        .score-header { background: #facc15; color: #000; font-weight: 900; font-size: 2.5rem; padding: 5px 20px; text-transform: uppercase; text-align: center;}
        .name-grid-container { border: 2px solid #525252; background: rgba(0,0,0,0.2); }
        .name-row { display: flex; border-bottom: 1px solid #525252; }
        .name-row:last-child { border-bottom: none; }
        .name-num { width: 40px; text-align: center; padding: 8px; border-right: 1px solid #525252; color: #a3a3a3; }
        .name-text { padding: 8px 16px; font-weight: 600; font-size: 1.25rem; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
    </style>
</head>
<body class="h-screen w-screen flex flex-col relative bg-black">

    <div class="absolute inset-0 z-0 flex items-center justify-center opacity-[0.03] pointer-events-none">
        <img src="logo-saya.svg" class="w-[800px] grayscale" alt="">
    </div>

    <div id="view-idle" class="absolute inset-0 z-50 flex flex-col items-center justify-center animate-pulse bg-black">
        <h1 class="text-3xl font-black text-slate-700 tracking-widest">TV SUTRADARA OFFLINE</h1>
    </div>

    <div id="view-preview" class="absolute inset-0 z-40 flex flex-col hidden bg-[#262626]">
        <div class="p-8 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-bold text-slate-400 uppercase tracking-wide">MASS KEMPO TOURNAMENT</h1>
                <h2 id="tv-header-kategori" class="text-5xl font-display font-bold text-white mt-1">-</h2>
            </div>
            <div class="text-right flex items-center gap-4">
                <div class="text-xl text-slate-400 font-bold uppercase tracking-widest text-right">WAKTU<br><span id="tv-header-waktu" class="text-5xl font-display text-white">00:00</span></div>
            </div>
        </div>
        <div class="flex-grow flex items-center justify-center">
            <div class="border border-slate-600 bg-black/40 p-10 rounded-3xl text-center w-3/4 shadow-2xl backdrop-blur-sm">
                <div class="text-yellow-500 text-2xl font-bold tracking-[0.3em] mb-4 uppercase"><i class="fas fa-play-circle mr-2"></i> SEDANG TAMPIL DI MATRAS</div>
                <div id="preview-nama" class="text-6xl font-black text-white leading-tight mb-4">-</div>
                <div class="inline-block bg-slate-800 border border-slate-600 px-6 py-2 rounded-full text-2xl font-bold text-slate-300">
                    KONTINGEN: <span id="preview-kontingen" class="text-white">-</span>
                </div>
            </div>
        </div>
    </div>

    <div id="view-score" class="w-full h-full hidden flex flex-col justify-between pt-4">
            
            <div class="flex justify-between items-start mb-6">
                <div class="border border-slate-400 p-3 flex items-center gap-4 min-w-[300px]">
                    <div class="w-16 h-12 bg-red-600 flex flex-col border border-slate-500">
                        <div class="flex-1 bg-red-600"></div>
                        <div class="flex-1 bg-white"></div>
                    </div>
                    <div>
                        <div class="text-[11px] text-slate-300 font-bold uppercase tracking-widest leading-none mb-1">KONTINGEN :</div>
                        <div id="tv-score-kontingen" class="text-3xl font-black text-white uppercase tracking-wider leading-none">DOJO UNDIP</div>
                    </div>
                </div>

                <div class="border border-slate-400 p-3 px-6 flex items-center gap-4">
                    <span id="tv-score-waktu" class="text-5xl font-mono font-bold text-white tracking-widest">01:30</span>
                    <i class="fas fa-stopwatch text-4xl text-slate-400"></i>
                </div>
            </div>

            <div class="flex gap-6 mb-6 flex-grow">
                
                <div class="w-5/12 border border-slate-400 flex flex-col">
                    <div class="text-center border-b border-slate-400 py-1.5 text-sm font-bold text-slate-300 uppercase tracking-widest">
                        ATLET
                    </div>
                    <div id="tv-score-name-container" class="flex flex-col p-4 gap-2 flex-grow justify-center">
                        </div>
                </div>

                <div class="w-7/12 border border-slate-400 flex flex-col items-center justify-center relative" 
                     style="clip-path: polygon(0 0, 100% 0, 100% calc(100% - 40px), calc(100% - 40px) 100%, 0 100%);">
                    <div class="text-3xl font-black text-white uppercase tracking-widest mb-2 mt-4">
                        NILAI AKHIR
                    </div>
                    <div class="text-center">
                        <span id="tv-score-final" class="text-[12rem] leading-none font-black text-[#cca650]">9.825</span>
                    </div>
                    <i class="fas fa-sparkles absolute bottom-4 right-4 text-3xl text-slate-500/50"></i>
                </div>

            </div>

            <div class="grid grid-cols-6 gap-4 h-32">
                <div id="tv-score-wasit-container" class="col-span-5 grid grid-cols-5 gap-4">
                    </div>

                <div class="border border-slate-400 flex flex-col text-center">
                    <div class="border-b border-slate-400 py-2 text-sm font-bold text-slate-300 uppercase tracking-widest">
                        DENDA
                    </div>
                    <div class="flex-grow flex items-center justify-center">
                        <span id="tv-score-denda" class="text-5xl font-black text-red-500">-0.10</span>
                    </div>
                </div>
            </div>

        </div>

    <div id="view-randori" class="absolute inset-0 z-50 flex hidden bg-black">
        <div class="flex-1 bg-red-600 flex flex-col justify-between p-10 relative">
             <div class="text-center bg-black/30 p-4 rounded-xl border border-red-500/50">
                 <div id="tv-randori-kategori" class="text-xl font-bold text-red-200 uppercase">-</div>
                 <div id="tv-randori-nama-merah" class="text-6xl font-black text-white">-</div>
                 <div id="tv-randori-kont-merah" class="text-2xl font-bold text-red-200">-</div>
             </div>
             <div class="flex-grow flex items-center justify-center">
                 <div id="tv-randori-skor-merah" class="text-[20rem] font-mono font-black text-white leading-none">0</div>
             </div>
        </div>
        <div class="absolute left-1/2 top-5 -translate-x-1/2 z-50 bg-slate-900 px-10 py-4 rounded-3xl border-2 border-slate-600 shadow-2xl">
            <span id="tv-randori-waktu" class="text-6xl font-mono font-black text-yellow-400 tracking-widest">00:00</span>
        </div>
        <div class="flex-1 bg-white flex flex-col justify-between p-10 relative">
             <div class="text-center bg-slate-200 p-4 rounded-xl border border-slate-300">
                 <div class="text-xl font-bold text-slate-500 uppercase">PITA PUTIH</div>
                 <div id="tv-randori-nama-putih" class="text-6xl font-black text-slate-900">-</div>
                 <div id="tv-randori-kont-putih" class="text-2xl font-bold text-slate-500">-</div>
             </div>
             <div class="flex-grow flex items-center justify-center">
                 <div id="tv-randori-skor-putih" class="text-[20rem] font-mono font-black text-slate-900 leading-none">0</div>
             </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA63UtPlhEdC9qKmmHVpDjGv_4RqWjK47k",
            authDomain: "mass-pro-turnamen.firebaseapp.com",
            projectId: "mass-pro-turnamen",
            databaseURL: "https://mass-pro-turnamen-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "mass-pro-turnamen.firebasestorage.app",
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const courtId = urlParams.get('court') || 'court_1';

        const views = {
            idle: document.getElementById('view-idle'),
            preview: document.getElementById('view-preview'),
            score: document.getElementById('view-score'),
            randori: document.getElementById('view-randori')
        };

        function switchView(target) {
            Object.values(views).forEach(v => v.classList.add('hidden'));
            views[target].classList.remove('hidden');
        }

        let displayTimer = null; 
        let savedPreviewData = null; 

        database.ref(`live_broadcast/${courtId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            
            // 1. Jika dimatikan
            if (!data || data.current_action === 'idle') {
                switchView('idle');
                return;
            }

            // 2. Jika Randori (Tampilan Merah vs Putih)
            if (data.type === 'randori') {
                if(displayTimer) { clearTimeout(displayTimer); displayTimer = null; }
                switchView('randori');
                
                document.getElementById('tv-randori-kategori').innerText = data.kategori || "-";
                document.getElementById('tv-randori-waktu').innerText = data.waktu || "00:00";
                
                document.getElementById('tv-randori-nama-merah').innerText = data.merah.nama || "-";
                document.getElementById('tv-randori-kont-merah').innerText = data.merah.kontingen || "-";
                document.getElementById('tv-randori-skor-merah').innerText = data.merah.skor || "0";
                
                document.getElementById('tv-randori-nama-putih').innerText = data.putih.nama || "-";
                document.getElementById('tv-randori-kont-putih').innerText = data.putih.kontingen || "-";
                document.getElementById('tv-randori-skor-putih').innerText = data.putih.skor || "0";
                return;
            }

            // 3. Simpan data antrean Embu
            if (data.preview_data) savedPreviewData = data.preview_data;

            // 4. Jika Perintahnya: TAMPILKAN NILAI EMBU!
            if (data.current_action === 'show_score' && data.score_data) {
                if(displayTimer) clearTimeout(displayTimer);
                switchView('score');
                
                const sData = data.score_data;
                document.getElementById('tv-score-kategori-head').innerText = sData.kategori;
                document.getElementById('tv-score-waktu').innerText = sData.waktu;
                document.getElementById('tv-score-kontingen').innerText = sData.kontingen;
                document.getElementById('tv-score-denda').innerText = sData.denda > 0 ? `-${sData.denda}` : '0';
                document.getElementById('tv-score-final').innerText = sData.nilaiAkhir;

                // Build Name Grid (Gaya List Angka)
                let names = sData.nama.split('&').map(n => n.trim());
                let nameHTML = '';
                names.forEach((n, idx) => {
                    nameHTML += `
                    <div class="flex items-center text-2xl text-white font-bold tracking-wide">
                        <span class="w-8 text-right mr-3">${idx+1}.</span>
                        <span class="truncate">${n}</span>
                    </div>`;
                });
                document.getElementById('tv-score-name-container').innerHTML = nameHTML;

                // Build Judge Panels (Gaya Kotak Bawah)
                let wasitHTML = '';
                let rawScores = sData.rawScores || [];
                while(rawScores.length < 5) rawScores.push('-');
                
                rawScores.forEach((score, i) => {
                    wasitHTML += `
                    <div class="border border-slate-400 flex flex-col text-center">
                        <div class="border-b border-slate-400 py-2 text-sm font-bold text-slate-300 uppercase tracking-widest">
                            WASIT ${i+1}
                        </div>
                        <div class="flex-grow flex items-center justify-center">
                            <span class="text-6xl font-black text-white">${score > 0 ? parseFloat(score).toFixed(2) : '-'}</span>
                        </div>
                    </div>`;
                });
                document.getElementById('tv-score-wasit-container').innerHTML = wasitHTML;
                
                displayTimer = setTimeout(() => {
                    if (savedPreviewData) {
                        document.getElementById('tv-header-kategori').innerText = savedPreviewData.kategori;
                        document.getElementById('preview-nama').innerText = savedPreviewData.nama;
                        document.getElementById('preview-kontingen').innerText = savedPreviewData.kontingen;
                    }
                    switchView('preview');
                    displayTimer = null; 
                }, 10000); // 10 Detik
            } 
            // 5. Jika Perintahnya: STANDBY EMBU
            else if (data.current_action === 'preview' && !displayTimer) {
                document.getElementById('tv-header-kategori').innerText = data.preview_data.kategori;
                document.getElementById('preview-nama').innerText = data.preview_data.nama;
                document.getElementById('preview-kontingen').innerText = data.preview_data.kontingen;
                document.getElementById('tv-header-waktu').innerText = '00:00';
                switchView('preview');
            }
        });
    </script>
</body>
</html>
