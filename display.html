<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Broadcast - MASS KEMPO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .text-glow { text-shadow: 0 0 20px rgba(255,255,255,0.3); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-center items-center bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]">

    <div id="view-idle" class="flex flex-col items-center justify-center animate-pulse">
        <img src="logo-saya.svg" class="w-40 h-40 mb-6 opacity-50" alt="Logo" onerror="this.style.display='none'">
        <h1 class="text-4xl font-black text-slate-600 tracking-widest">MASS KEMPO</h1>
        <p class="text-slate-700 mt-2 font-mono text-xl" id="court-name-display">MENUNGGU SINYAL...</p>
    </div>

    <div id="view-embu" class="hidden w-full h-full p-8 flex flex-col justify-between">
        <div class="glass-panel rounded-3xl p-6 mb-6 text-center border-b-4 border-blue-500 shadow-2xl">
            <div id="tv-embu-kategori" class="text-3xl font-bold text-blue-400 uppercase tracking-widest mb-2">KATEGORI</div>
            <div id="tv-embu-nama" class="text-7xl font-black text-white text-glow leading-tight whitespace-nowrap overflow-hidden text-ellipsis">NAMA ATLET</div>
            <div id="tv-embu-kontingen" class="text-3xl font-bold text-slate-400 mt-2 bg-slate-800 inline-block px-6 py-2 rounded-full border border-slate-600">KONTINGEN</div>
        </div>

        <div class="grid grid-cols-5 gap-6 mb-6" id="tv-embu-wasit-container">
            </div>

        <div class="grid grid-cols-3 gap-6 flex-grow">
            <div class="glass-panel rounded-3xl p-6 flex flex-col items-center justify-center border border-slate-700">
                <span class="text-2xl text-slate-400 font-bold uppercase tracking-widest">Waktu</span>
                <span id="tv-embu-waktu" class="text-6xl font-mono font-black text-white mt-2">00:00</span>
            </div>
            <div class="glass-panel rounded-3xl p-6 flex flex-col items-center justify-center border border-red-900/50">
                <span class="text-2xl text-slate-400 font-bold uppercase tracking-widest">Denda</span>
                <span id="tv-embu-denda" class="text-6xl font-black text-red-500 mt-2">0</span>
            </div>
            <div class="glass-panel rounded-3xl p-6 flex flex-col items-center justify-center border-2 border-green-500 bg-green-900/20 shadow-[0_0_30px_rgba(34,197,94,0.2)]">
                <span class="text-2xl text-green-400 font-bold uppercase tracking-widest mb-2">NILAI AKHIR</span>
                <span id="tv-embu-final" class="text-8xl font-black text-white text-glow">000.0</span>
            </div>
        </div>
    </div>

    <div id="view-randori" class="hidden w-full h-full flex">
        <div class="flex-1 bg-red-600/90 flex flex-col justify-between p-10 border-r-8 border-slate-900 shadow-2xl relative">
            <div class="text-center bg-red-950/50 p-4 rounded-2xl border border-red-400/30">
                <div id="tv-randori-kategori" class="text-xl font-bold text-red-200 uppercase mb-2">KATEGORI</div>
                <div id="tv-randori-nama-merah" class="text-6xl font-black text-white leading-tight">AKA (MERAH)</div>
                <div id="tv-randori-kont-merah" class="text-2xl font-bold text-red-200 mt-2">KONTINGEN</div>
            </div>
            <div class="flex-grow flex items-center justify-center">
                <div id="tv-randori-skor-merah" class="text-[20rem] font-mono font-black text-white leading-none text-glow">0</div>
            </div>
        </div>

        <div class="absolute left-1/2 top-10 -translate-x-1/2 z-50 glass-panel px-12 py-6 rounded-b-3xl border-x-4 border-b-4 border-slate-500 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
            <div class="text-center">
                <span class="text-slate-400 font-bold uppercase tracking-widest block mb-2">Waktu Pertandingan</span>
                <span id="tv-randori-waktu" class="text-7xl font-mono font-black text-yellow-400">00:00</span>
            </div>
        </div>

        <div class="flex-1 bg-white flex flex-col justify-between p-10 border-l-8 border-slate-900 shadow-2xl relative">
            <div class="text-center bg-slate-100 p-4 rounded-2xl border border-slate-300">
                <div class="text-xl font-bold text-slate-500 uppercase mb-2">PITA PUTIH</div>
                <div id="tv-randori-nama-putih" class="text-6xl font-black text-slate-900 leading-tight">SHIRO (PUTIH)</div>
                <div id="tv-randori-kont-putih" class="text-2xl font-bold text-slate-500 mt-2">KONTINGEN</div>
            </div>
            <div class="flex-grow flex items-center justify-center">
                <div id="tv-randori-skor-putih" class="text-[20rem] font-mono font-black text-slate-900 leading-none">0</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // 1. Samakan dengan Config Anda
        const firebaseConfig = {
            apiKey: "AIzaSyA63UtPlhEdC9qKmmHVpDjGv_4RqWjK47k",
            authDomain: "mass-pro-turnamen.firebaseapp.com",
            projectId: "mass-pro-turnamen",
            databaseURL: "https://mass-pro-turnamen-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "mass-pro-turnamen.firebasestorage.app",
            messagingSenderId: "268290671498",
            appId: "1:268290671498:web:d55e4960e392f7dfc8fe73"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. Ambil Parameter Court (Contoh: display.html?court=court_1)
        const urlParams = new URLSearchParams(window.location.search);
        const courtId = urlParams.get('court') || 'court_1';
        document.getElementById('court-name-display').innerText = courtId.replace('_', ' ').toUpperCase();

        const views = {
            idle: document.getElementById('view-idle'),
            embu: document.getElementById('view-embu'),
            randori: document.getElementById('view-randori')
        };

        function switchView(target) {
            Object.values(views).forEach(v => v.classList.add('hidden'));
            views[target].classList.remove('hidden');
        }

        // 3. Listener Real-time
        database.ref(`live_broadcast/${courtId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data || data.type === 'idle') {
                switchView('idle');
                return;
            }

            if (data.type === 'embu') {
                switchView('embu');
                document.getElementById('tv-embu-kategori').innerText = data.kategori || "-";
                document.getElementById('tv-embu-nama').innerText = data.nama || "-";
                document.getElementById('tv-embu-kontingen').innerText = data.kontingen || "-";
                
                // Cek apakah ini mode pre-view (belum dinilai) atau sudah final
                if (data.status === 'preview') {
                    document.getElementById('tv-embu-waktu').innerText = "00:00";
                    document.getElementById('tv-embu-denda').innerText = "0";
                    document.getElementById('tv-embu-final').innerText = "MENUNGGU";
                    document.getElementById('tv-embu-wasit-container').innerHTML = '';
                } else {
                    document.getElementById('tv-embu-waktu').innerText = data.waktu || "00:00";
                    document.getElementById('tv-embu-denda').innerText = data.denda || "0";
                    document.getElementById('tv-embu-final').innerText = data.nilaiAkhir || "000.0";
                    
                    let wasitHTML = '';
                    const rawScores = data.rawScores || [];
                    rawScores.forEach((score, i) => {
                        wasitHTML += `
                        <div class="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center">
                            <span class="text-sm font-bold text-slate-400 uppercase">Juri ${i+1}</span>
                            <span class="text-4xl font-black text-white mt-1">${score || '-'}</span>
                        </div>`;
                    });
                    document.getElementById('tv-embu-wasit-container').innerHTML = wasitHTML;
                }
            } 
            else if (data.type === 'randori') {
                switchView('randori');
                document.getElementById('tv-randori-kategori').innerText = data.kategori || "-";
                document.getElementById('tv-randori-nama-merah').innerText = data.merah.nama || "-";
                document.getElementById('tv-randori-kont-merah').innerText = data.merah.kontingen || "-";
                document.getElementById('tv-randori-skor-merah').innerText = data.merah.skor || "0";
                
                document.getElementById('tv-randori-nama-putih').innerText = data.putih.nama || "-";
                document.getElementById('tv-randori-kont-putih').innerText = data.putih.kontingen || "-";
                document.getElementById('tv-randori-skor-putih').innerText = data.putih.skor || "0";
                
                document.getElementById('tv-randori-waktu').innerText = data.waktu || "00:00";
            }
        });
    </script>
</body>
</html>
