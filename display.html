<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Broadcast - MASS KEMPO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Desain mendekati referensi gambar */
        body { font-family: 'Inter', sans-serif; background-color: #262626; color: #fff; overflow: hidden; }
        .bg-carbon { background: #2f2f2f; }
        .font-display { font-family: 'Oswald', sans-serif; }
        
        .judge-box { border: 2px solid #525252; text-align: center; background: rgba(0,0,0,0.2); }
        .judge-header { border-bottom: 2px solid #525252; padding: 4px; font-size: 1rem; color: #a3a3a3; letter-spacing: 1px; }
        .judge-score { font-size: 3.5rem; font-weight: 900; padding: 10px; font-family: 'Oswald', sans-serif; }
        
        .score-board { border: 4px solid #facc15; border-radius: 16px; background: #171717; position: relative; }
        .score-header { background: #facc15; color: #000; font-weight: 900; font-size: 2.5rem; padding: 5px 20px; text-transform: uppercase; text-align: center;}
        
        .name-grid-container { border: 2px solid #525252; background: rgba(0,0,0,0.2); }
        .name-row { display: flex; border-bottom: 1px solid #525252; }
        .name-row:last-child { border-bottom: none; }
        .name-num { width: 40px; text-align: center; padding: 8px; border-right: 1px solid #525252; color: #a3a3a3; }
        .name-text { padding: 8px 16px; font-weight: 600; font-size: 1.25rem; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
    </style>
</head>
<body class="h-screen w-screen flex flex-col relative">

    <div class="absolute inset-0 z-0 flex items-center justify-center opacity-5 pointer-events-none">
        <img src="logo-saya.svg" class="w-[800px] grayscale" alt="">
    </div>

    <div class="z-10 w-full p-8 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-bold text-slate-300 uppercase tracking-wide">MASS KEMPO TOURNAMENT</h1>
            <h2 id="tv-header-kategori" class="text-5xl font-display font-bold text-white mt-1">MENUNGGU SINYAL...</h2>
        </div>
        <div class="text-right flex items-center gap-4">
            <div class="text-xl text-slate-400 font-bold uppercase tracking-widest text-right">WAKTU<br><span id="tv-header-waktu" class="text-5xl font-display text-white">00:00</span></div>
            <i class="fas fa-stopwatch text-5xl text-slate-500"></i>
        </div>
    </div>

    <div class="z-10 flex-grow px-8 pb-8 flex flex-col justify-center">

        <div id="view-preview" class="w-full flex flex-col items-center justify-center animate-fade-in hidden">
            <div class="border border-slate-600 bg-black/40 p-10 rounded-3xl text-center w-3/4 shadow-2xl backdrop-blur-sm">
                <div class="text-yellow-500 text-2xl font-bold tracking-[0.3em] mb-4 uppercase"><i class="fas fa-play-circle mr-2"></i> SEDANG TAMPIL DI MATRAS</div>
                <div id="preview-nama" class="text-6xl font-black text-white leading-tight mb-4">-</div>
                <div class="inline-block bg-slate-800 border border-slate-600 px-6 py-2 rounded-full text-2xl font-bold text-slate-300">
                    KONTINGEN: <span id="preview-kontingen" class="text-white">-</span>
                </div>
            </div>
        </div>

        <div id="view-score" class="w-full hidden">
            <div class="flex gap-8 items-start">
                
                <div class="w-5/12 flex flex-col gap-6">
                    <div id="tv-score-name-container" class="name-grid-container flex flex-col">
                        </div>
                    
                    <div class="border-2 border-slate-600 bg-black/30 p-4 flex items-center gap-6">
                        <div class="w-16 h-12 bg-red-600 flex flex-col"><div class="flex-1 bg-red-600"></div><div class="flex-1 bg-white"></div></div>
                        <div>
                            <div class="text-lg text-slate-400 font-bold uppercase tracking-widest">KONTINGEN :</div>
                            <div id="tv-score-kontingen" class="text-4xl font-black text-white uppercase tracking-wider">JAWA BARAT</div>
                        </div>
                    </div>

                    <div class="w-48 border-2 border-slate-600 bg-black/30 mt-4">
                        <div class="text-center border-b-2 border-slate-600 p-2 text-xl font-bold text-slate-400 uppercase">DENDA</div>
                        <div id="tv-score-denda" class="text-center p-4 text-5xl font-black text-red-500 font-display">-0.0</div>
                    </div>
                </div>

                <div class="w-7/12 flex flex-col">
                    <div class="text-right mb-2 text-slate-400 font-bold tracking-widest"><i class="fas fa-users"></i> JUDGE PANEL</div>
                    <div id="tv-score-wasit-container" class="flex justify-end gap-2 mb-10">
                        </div>

                    <div class="score-board self-end w-[90%] shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                        <div class="score-header">SKOR AKHIR</div>
                        <div class="text-center py-6">
                            <span id="tv-score-final" class="text-[10rem] leading-none font-display text-[#cca650]">0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA63UtPlhEdC9qKmmHVpDjGv_4RqWjK47k",
            authDomain: "mass-pro-turnamen.firebaseapp.com",
            projectId: "mass-pro-turnamen",
            databaseURL: "https://mass-pro-turnamen-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "mass-pro-turnamen.firebasestorage.app",
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const courtId = urlParams.get('court') || 'court_1';

        const viewPreview = document.getElementById('view-preview');
        const viewScore = document.getElementById('view-score');
        
        let displayTimer = null; // Stopwatch Rahasia TV
        let savedPreviewData = null; // Menyimpan data peserta yang mengantre

        database.ref(`live_broadcast/${courtId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // 1. Simpan data PREVIEW secara diam-diam (Skenario Detik ke-0.1 saat Auto-Next)
            if (data.preview_data) {
                savedPreviewData = data.preview_data;
            }

            // 2. Jika Surat Perintah berbunyi: "TAMPILKAN SKOR!" (Skenario Detik ke-0.5)
            if (data.current_action === 'show_score' && data.score_data) {
                // Hentikan timer sebelumnya jika ada bentrokan
                if(displayTimer) clearTimeout(displayTimer);
                
                const sData = data.score_data;
                document.getElementById('tv-header-kategori').innerText = sData.kategori;
                document.getElementById('tv-header-waktu').innerText = sData.waktu;
                document.getElementById('tv-score-kontingen').innerText = sData.kontingen;
                document.getElementById('tv-score-denda').innerText = sData.denda > 0 ? `-${sData.denda}` : '0';
                document.getElementById('tv-score-final').innerText = sData.nilaiAkhir;

                // Build Name Grid (Support Beregu)
                let names = sData.nama.split('&').map(n => n.trim());
                let nameHTML = '';
                names.forEach((n, idx) => {
                    nameHTML += `<div class="name-row"><div class="name-num">${idx+1}</div><div class="name-text">${n}</div></div>`;
                });
                document.getElementById('tv-score-name-container').innerHTML = nameHTML;

                // Build Judge Panels
                let wasitHTML = '';
                let rawScores = sData.rawScores || [];
                // Pad with empty scores if less than 5
                while(rawScores.length < 5) rawScores.push('-');
                
                rawScores.forEach((score, i) => {
                    wasitHTML += `<div class="judge-box flex-1"><div class="judge-header">WASIT ${i+1}</div><div class="judge-score text-white">${score > 0 ? parseFloat(score).toFixed(1) : '-'}</div></div>`;
                });
                document.getElementById('tv-score-wasit-container').innerHTML = wasitHTML;

                // TAMPILKAN LAYAR SKOR SEKARANG!
                viewPreview.classList.add('hidden');
                viewScore.classList.remove('hidden');

                // 3. MULAI STOPWATCH RAHASIA 10 DETIK (Skenario Detik ke-10)
                displayTimer = setTimeout(() => {
                    // Waktu Habis! Pindah ke Mode Preview menggunakan data cadangan
                    if (savedPreviewData) {
                        document.getElementById('tv-header-kategori').innerText = savedPreviewData.kategori;
                        document.getElementById('preview-nama').innerText = savedPreviewData.nama;
                        document.getElementById('preview-kontingen').innerText = savedPreviewData.kontingen;
                    }
                    viewScore.classList.add('hidden');
                    viewPreview.classList.remove('hidden');
                    
                    // 👇 TAMBAHKAN 1 BARIS INI DI SINI 👇
                    displayTimer = null; 

                }, 10000); // 10000 ms = 10 Detik
            } 
            // Jika Perintahnya adalah Preview (Misal saat panitera mengubah nama secara manual)
            else if (data.current_action === 'preview' && !displayTimer) {
                // Hanya izinkan ganti ke layar preview jika Timer Skor TIDAK sedang berjalan
                document.getElementById('tv-header-kategori').innerText = data.preview_data.kategori;
                document.getElementById('preview-nama').innerText = data.preview_data.nama;
                document.getElementById('preview-kontingen').innerText = data.preview_data.kontingen;
                document.getElementById('tv-header-waktu').innerText = '00:00';
                
                viewScore.classList.add('hidden');
                viewPreview.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
