<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASS - Martial Arts Scoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .active-tab { border-bottom: 4px solid #3b82f6; color: #3b82f6; }
        input:focus { border-color: #3b82f6; ring: 2px; ring-color: #3b82f6; }
        .bg-dark-card { background-color: #1e293b; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <nav class="bg-slate-800 border-b border-slate-700 sticky top-0 z-50">
        <div class="container mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-mitten"></i></div>
                <span class="text-xl font-bold tracking-tighter">MASS <span class="text-blue-500">PRO</span></span>
            </div>
            <div class="flex gap-6 h-full items-center">
                <button onclick="switchTab('admin')" id="tab-admin" class="px-3 py-5 font-semibold active-tab transition-all">ADMIN</button>
                <button onclick="switchTab('scoring')" id="tab-scoring" class="px-3 py-5 font-semibold text-slate-400 hover:text-white transition-all">PENILAIAN</button>
                <button onclick="switchTab('ranking')" id="tab-ranking" class="px-3 py-5 font-semibold text-slate-400 hover:text-white transition-all">RANKING</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        
        <section id="section-admin" class="space-y-6">
            <div class="flex justify-between items-end">
                <h2 class="text-2xl font-bold text-blue-400"><i class="fas fa-users-cog mr-2"></i>Manajemen Peserta</h2>
                <div class="flex gap-2">
                    <input type="file" id="csv-import" class="hidden" accept=".csv" onchange="importCSV(event)">
                    <button onclick="document.getElementById('csv-import').click()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm"><i class="fas fa-file-import mr-1"></i> Import CSV</button>
                    <button onclick="resetData()" class="bg-red-900/50 hover:bg-red-800 px-4 py-2 rounded-lg text-sm border border-red-700"><i class="fas fa-trash mr-1"></i> Reset</button>
                </div>
            </div>

            <div class="bg-dark-card p-6 rounded-xl border border-slate-700">
                <form id="form-peserta" class="grid grid-cols-1 md:grid-cols-5 gap-4">
                    <input type="text" id="p-nama" placeholder="Nama Peserta" class="bg-slate-800 border border-slate-600 p-3 rounded-lg outline-none" required>
                    <input type="text" id="p-kontingen" placeholder="Dojo / Kontingen" class="bg-slate-800 border border-slate-600 p-3 rounded-lg outline-none" required>
                    <input type="text" id="p-kategori" placeholder="Nomor Pertandingan" class="bg-slate-800 border border-slate-600 p-3 rounded-lg outline-none" required>
                    <input type="number" id="p-urut" placeholder="No. Urut" class="bg-slate-800 border border-slate-600 p-3 rounded-lg outline-none" required>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 font-bold rounded-lg transition-colors">TAMBAH PESERTA</button>
                </form>
            </div>

            <div class="overflow-x-auto rounded-xl border border-slate-700">
                <table class="w-full text-left bg-dark-card">
                    <thead class="bg-slate-800 text-slate-400 text-sm uppercase">
                        <tr>
                            <th class="p-4">Urut</th>
                            <th class="p-4">Nama</th>
                            <th class="p-4">Kontingen</th>
                            <th class="p-4">Kategori</th>
                            <th class="p-4 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-peserta-body"></tbody>
                </table>
            </div>
        </section>

        <section id="section-scoring" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-dark-card p-6 rounded-xl border border-slate-700 col-span-1">
                    <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-widest">Pengaturan Arena</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs mb-1">Pilih Court</label>
                            <select id="select-court" class="w-full bg-slate-800 border border-slate-600 p-3 rounded-lg appearance-none">
                                <option>Court A</option><option>Court B</option><option>Court C</option><option>Court D</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs mb-1">Nomor Pertandingan</label>
                            <select id="select-kategori" onchange="filterPesertaScoring()" class="w-full bg-slate-800 border border-slate-600 p-3 rounded-lg"></select>
                        </div>
                        <div>
                            <label class="block text-xs mb-1">Pilih Peserta Tampil</label>
                            <select id="select-peserta" class="w-full bg-blue-900/50 border border-blue-500 p-3 rounded-lg font-bold text-blue-200"></select>
                        </div>
                    </div>
                </div>

                <div class="bg-dark-card p-6 rounded-xl border border-slate-700 col-span-1 md:col-span-2">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold">Input Nilai Juri</h3>
                        <div class="flex bg-slate-800 rounded-lg p-1">
                            <button onclick="setJudges(3)" id="btn-j3" class="px-4 py-1 rounded bg-blue-600">3 Juri</button>
                            <button onclick="setJudges(5)" id="btn-j5" class="px-4 py-1 rounded">5 Juri</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8" id="judge-inputs">
                        </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 border-t border-slate-700 pt-6">
                        <div class="bg-slate-800 p-4 rounded-xl text-center">
                            <div class="text-4xl font-mono font-bold mb-4 text-yellow-500" id="timer-display">00:00</div>
                            <div class="flex justify-center gap-2">
                                <button onclick="toggleTimer()" id="btn-timer" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-lg w-24">START</button>
                                <button onclick="resetTimer()" class="bg-slate-600 hover:bg-slate-500 px-4 py-2 rounded-lg">RESET</button>
                            </div>
                            <div class="mt-4 grid grid-cols-2 gap-2 text-xs">
                                <div>Min: <input type="number" id="min-time" value="60" class="bg-slate-700 w-12 p-1 rounded text-center">s</div>
                                <div>Max: <input type="number" id="max-time" value="120" class="bg-slate-700 w-12 p-1 rounded text-center">s</div>
                            </div>
                        </div>

                        <div class="flex flex-col justify-center items-center bg-blue-900/20 rounded-xl border border-blue-500/30">
                            <span class="text-xs uppercase text-blue-400">Nilai Akhir</span>
                            <span class="text-6xl font-black text-white" id="live-final-score">000.0</span>
                            <button onclick="saveScore()" class="mt-4 bg-blue-600 hover:bg-blue-500 px-10 py-3 rounded-xl font-bold text-lg shadow-lg shadow-blue-900/50">SIMPAN NILAI</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-ranking" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold text-yellow-500"><i class="fas fa-trophy mr-2"></i>Klasemen Real-Time</h2>
                <div class="flex gap-2">
                    <select id="rank-filter-kategori" onchange="updateRankingView()" class="bg-slate-800 border border-slate-700 p-2 rounded-lg text-sm"></select>
                    <button onclick="exportToCSV()" class="bg-green-700 hover:bg-green-600 px-4 py-2 rounded-lg text-sm"><i class="fas fa-file-excel mr-1"></i> Export Excel/CSV</button>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4" id="ranking-list">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
